<section class="destinations">
  <div class="section-head">
    <div>
      <p class="eyebrow">Starter Ideas</p>
      <h2>Pick a proven route.</h2>
    </div>
    <p>Tap a card to tune the planner instantly.</p>
  </div>

  <div class="carousel-wrapper" @galleryIn>
    <div class="carousel-container"
         (mousedown)="onDragStart($event)"
         (mousemove)="onDragMove($event)"
         (mouseup)="onDragEnd()"
         (mouseleave)="onDragEnd()"
         (touchstart)="onDragStart($event)"
         (touchmove)="onDragMove($event)"
         (touchend)="onDragEnd()">
      <div class="carousel-3d" #carousel3d>
        <button type="button" class="carousel-item" *ngFor="let destination of destinations" (click)="onItemClick($event, destination)">
          <div class="img-wrapper">
            <video 
              *ngIf="destination.video"
              [src]="destination.video"
              autoplay
              loop
              muted
              playsinline
              class="motion-bg"
              (error)="destination.video = undefined"
            >
            </video>
            <img
              *ngIf="!destination.video"
              [src]="destination.image"
              [alt]="destination.name"
              loading="eager"
              (error)="useFallbackImage($event)"
            >
            <div class="card-overlay"></div>
          </div>
          <div class="content">
            <span>{{ destination.name }}</span>
            <small>{{ destination.best_for }}</small>
          </div>
        </button>
      </div>
    </div>
  </div>
</section>
