<section class="destinations">
  <div class="section-head">
    <div>
      <p class="eyebrow">Starter Ideas</p>
      <h2>Pick a proven route.</h2>
    </div>
    <p>Tap a card to tune the planner instantly.</p>
  </div>

  <div class="destination-grid" @galleryIn>
    <button type="button" *ngFor="let destination of destinations" (click)="choose.emit(destination)">
      <div class="img-wrapper">
        <video 
          *ngIf="destination.video"
          autoplay
          loop
          muted
          playsinline
          class="motion-bg"
        >
          <source [src]="destination.video" type="video/mp4">
        </video>
        <img *ngIf="!destination.video" [src]="destination.image" [alt]="destination.name" loading="eager" crossorigin="anonymous">
        <div class="card-overlay"></div>
      </div>
      <div class="content">
        <span>{{ destination.name }}</span>
        <small>{{ destination.best_for }}</small>
      </div>
    </button>
  </div>
</section>
